    MissionStreamOpen:
      type: object
      required: [request_id, mission_id]
      properties:
        request_id:
          type: string
        mission_id:
          type: string

    MissionStreamClose:
      type: object
      required: [request_id, mission_id]
      properties:
        request_id:
          type: string
        mission_id:
          type: string
        reason:
          type: string

    MissionStreamUpdate:
      type: object
      required: [mission_id, timestamp, data]
      properties:
        mission_id:
          type: string
        timestamp:
          type: string
          format: date-time
        data:
          $ref: '#/components/schemas/Mission'

    MissionSseDataEnvelope:
      oneOf:
        - $ref: '#/components/schemas/MissionStreamOpen'
        - $ref: '#/components/schemas/MissionStreamClose'
        - $ref: '#/components/schemas/MissionStreamUpdate'

    CouncilRunStreamOpen:
      type: object
      required: [request_id, run_id]
      properties:
        request_id:
          type: string
        run_id:
          type: string

    CouncilRunStreamClose:
      type: object
      required: [run_id]
      properties:
        run_id:
          type: string

    CouncilRunStreamUpdate:
      type: object
      required: [run_id, timestamp, data]
      properties:
        run_id:
          type: string
        timestamp:
          type: string
          format: date-time
        data:
          $ref: '#/components/schemas/CouncilRun'

    CouncilRunSseDataEnvelope:
      oneOf:
        - $ref: '#/components/schemas/CouncilRunStreamOpen'
        - $ref: '#/components/schemas/CouncilRunStreamClose'
        - $ref: '#/components/schemas/CouncilRunStreamUpdate'

    ExecutionRunStreamOpen:
      type: object
      required: [request_id, run_id]
      properties:
        request_id:
          type: string
        run_id:
          type: string

    ExecutionRunStreamClose:
      type: object
      required: [run_id]
      properties:
        run_id:
          type: string

    ExecutionRunStreamUpdate:
      type: object
      required: [run_id, timestamp, data]
      properties:
        run_id:
          type: string
        timestamp:
          type: string
          format: date-time
        data:
          $ref: '#/components/schemas/ExecutionRun'

    ExecutionRunSseDataEnvelope:
