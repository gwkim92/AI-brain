      type: object
      required: [request_id, data, meta]
      properties:
        request_id:
          type: string
        data:
          $ref: '#/components/schemas/UpgradeRun'
        meta:
          $ref: '#/components/schemas/ApiMeta'

    ApiSuccessAccepted:
      type: object
      required: [request_id, data, meta]
      properties:
        request_id:
          type: string
        data:
          type: object
          required: [accepted]
          properties:
            accepted:
              type: boolean
        meta:
          $ref: '#/components/schemas/ApiMeta'

    TelegramCommandResult:
      oneOf:
        - type: object
          required: [status, type, run]
          properties:
            status:
              type: string
              enum: [accepted]
            type:
              type: string
              enum: [start]
            run:
              type: object
              required: [id, proposalId, status]
              properties:
                id:
                  type: string
                proposalId:
                  type: string
                status:
                  type: string
        - type: object
          required: [status, type]
          properties:
            status:
              type: string
              enum: [accepted]
            type:
              type: string
              enum: [status_digest, proposal_summary]
        - type: object
          required: [status, reason]
          properties:
            status:
              type: string
              enum: [rejected]
            reason:
              type: string
              enum: [proposal_not_found, proposal_not_approved, invalid_command]

    TelegramWebhookCallbackResult:
      oneOf:
        - type: object
          required: [accepted, type, proposal_id]
          properties:
            accepted:
              type: boolean
              enum: [true]
            type:
              type: string
              enum: [approve]
            proposal_id:
              type: string
              format: uuid
        - type: object
          required: [accepted, type, proposal_id, run_id]
          properties:
            accepted:
              type: boolean
              enum: [true]
            type:
              type: string
              enum: [approve_and_start]
            proposal_id:
              type: string
              format: uuid
            run_id:
              type: string
        - type: object
          required: [accepted, ignored, reason]
          properties:
            accepted:
              type: boolean
              enum: [false]
            ignored:
              type: boolean
              enum: [true]
            reason:
              type: string
              enum: [invalid_payload, missing_signature, invalid_signature, expired, replayed]
        - type: object
          required: [accepted, reason, proposal_id]
          properties:
            accepted:
              type: boolean
              enum: [false]
            reason:
              type: string
              enum: [proposal_not_found]
            proposal_id:
              type: string
              format: uuid
        - type: object
          required: [accepted, ignored]
          properties:
            accepted:
              type: boolean
              enum: [true]
            ignored:
              type: boolean
              enum: [true]

    ApiSuccessTelegramCommand:
      type: object
      required: [request_id, data, meta]
      properties:
        request_id:
          type: string
        data:
          oneOf:
            - $ref: '#/components/schemas/TelegramCommandResult'
            - $ref: '#/components/schemas/TelegramWebhookCallbackResult'
        meta:
          $ref: '#/components/schemas/ApiMeta'
