services:
  postgres:
    image: pgvector/pgvector:pg18
    container_name: jarvis-postgres
    environment:
      POSTGRES_USER: jarvis
      POSTGRES_PASSWORD: jarvis
      POSTGRES_DB: jarvis
    ports:
      - '5432:5432'
    volumes:
      - jarvis-postgres18-data:/var/lib/postgresql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U jarvis -d jarvis']
      interval: 5s
      timeout: 5s
      retries: 10

  valkey:
    image: valkey/valkey:9
    container_name: jarvis-valkey
    ports:
      - '6380:6379'
    command: ['valkey-server', '--save', '', '--appendonly', 'no']
    healthcheck:
      test: ['CMD', 'valkey-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: jarvis-backend
    env_file:
      - ./backend/.env.example
    environment:
      STORE_BACKEND: postgres
      DATABASE_URL: postgres://jarvis:jarvis@postgres:5432/jarvis
      ALLOWED_ORIGINS: http://localhost:3000,http://127.0.0.1:3000,http://web:3000
    ports:
      - '4000:4000'
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
    command: ['sh', '-c', 'pnpm db:init && pnpm start']

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: jarvis-web
    environment:
      NEXT_PUBLIC_BACKEND_BASE_URL: http://backend:4000
    ports:
      - '3000:3000'
    depends_on:
      - backend

volumes:
  jarvis-postgres18-data:
